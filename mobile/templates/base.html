<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Velorix{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:      #1a73e8;
            --blue-dark: #0d5abf;
            --blue-light:#dbeafe;
            --nav-bg:    #1a2535;
            --bg:        #f5f7fa;
            --card:      #ffffff;
            --border:    #e2e8f0;
            --text:      #1a2535;
            --text2:     #6b7280;
            --red:       #ef4444;
            --green:     #10b981;
            --yellow:    #f59e0b;
        }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: var(--nav-bg);
            padding: 0 20px;
            display: flex; align-items: center; justify-content: space-between;
            height: 54px;
            position: sticky; top: 0; z-index: 200;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .nav-logo { color: #fff; font-weight: 800; font-size: 18px; letter-spacing: 2px; display: flex; align-items: center; gap: 8px; }
        .nav-logo span { color: var(--blue); }
        .nav-user { color: #b0bec5; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .nav-user a { color: var(--red); text-decoration: none; font-size: 12px; }

        /* ── MENU ── */
        .nav-menu {
            background: var(--card);
            display: flex;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nav-menu a {
            color: var(--text2);
            text-decoration: none;
            padding: 13px 18px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }
        .nav-menu a:hover { color: var(--blue); }
        .nav-menu a.activ { color: var(--blue); border-bottom-color: var(--blue); }

        /* ── CONTENT ── */
        .content { padding: 24px 20px; max-width: 680px; margin: 0 auto; }

        /* ── CARDS ── */
        .card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* ── FORM ── */
        label {
            display: block;
            color: var(--text2);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        input[type=text], input[type=email], input[type=password],
        input[type=date], input[type=time], input[type=number],
        select, textarea {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            padding: 11px 14px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--blue);
            background: #fff;
        }
        textarea { resize: vertical; min-height: 80px; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ── BUTOANE ── */
        .btn-primary {
            background: var(--blue);
            color: #fff; border: none;
            border-radius: 8px; padding: 12px 20px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; text-decoration: none;
            display: inline-block; transition: background 0.2s;
        }
        .btn-primary:hover { background: var(--blue-dark); }
        .btn-secondary {
            background: #f1f5f9; color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 16px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; text-decoration: none;
            display: inline-block; transition: background 0.2s;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        .btn-danger {
            background: #fef2f2; color: var(--red);
            border: 1px solid #fecaca;
            border-radius: 8px; padding: 10px 16px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; display: inline-block;
            transition: background 0.2s;
        }
        .btn-danger:hover { background: #fee2e2; }
        .btn-full { width: 100%; text-align: center; padding: 13px; font-size: 15px; }

        /* ── TOP BAR ── */
        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .top-bar h2 { font-size: 20px; font-weight: 700; }

        /* ── BADGE ── */
        .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
        .badge-blue    { background: var(--blue-light); color: var(--blue); }
        .badge-green   { background: #d1fae5; color: #065f46; }
        .badge-red     { background: #fee2e2; color: #991b1b; }
        .badge-yellow  { background: #fef3c7; color: #92400e; }
        .badge-gray    { background: #f1f5f9; color: #475569; }

        /* ── BACK LINK ── */
        .back { color: var(--text2); text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px; }
        .back:hover { color: var(--blue); }

        /* ── ALERT ── */
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; }

        /* ── DIVIDER ── */
        .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

        /* ── EMPTY STATE ── */
        .empty { text-align: center; padding: 48px 20px; color: var(--text2); }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }

        /* ── SEARCH ── */
        .search-bar { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-bar input { margin-bottom: 0; flex: 1; }
        .search-bar button { flex-shrink: 0; }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <span class="nav-logo">VELORIX</span>
        <span class="nav-user">
            {{ user }}
            <a href="/logout">Iesire</a>
        </span>
    </nav>
    <div class="nav-menu">
        <a href="/dashboard" {% if activ == 'dashboard' %}class="activ"{% endif %}>Dashboard</a>
        <a href="/programari" {% if activ == 'programari' %}class="activ"{% endif %}>Programari</a>
        <a href="/clienti" {% if activ == 'clienti' %}class="activ"{% endif %}>Clienti</a>
        <a href="/vehicule"   {% if activ == 'vehicule'   %}class="activ"{% endif %}>Vehicule</a>
        <a href="/lucrari"    {% if activ == 'lucrari'    %}class="activ"{% endif %}>Lucrari</a>
        <a href="/fise"       {% if activ == 'fise'       %}class="activ"{% endif %}>Fise Service</a>
        <a href="/devize"     {% if activ == 'devize'     %}class="activ"{% endif %}>Devize</a>
        <a href="/stocuri"    {% if activ == 'stocuri'    %}class="activ"{% endif %}>Stocuri</a>
        <a href="/comenzi"    {% if activ == 'comenzi'    %}class="activ"{% endif %}>Comenzi</a>
        <a href="/istoric"    {% if activ == 'istoric'    %}class="activ"{% endif %}>Istoric</a>
        <a href="/rapoarte"   {% if activ == 'rapoarte'   %}class="activ"{% endif %}>Rapoarte</a>
        <a href="/notificari" {% if activ == 'notificari' %}class="activ"{% endif %}>Notificari</a>
        <a href="/setari"     {% if activ == 'setari'     %}class="activ"{% endif %}>Setari</a>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
