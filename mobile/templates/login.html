<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velorix — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0f1923;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .card {
            background: #1a2535;
            border-radius: 16px;
            padding: 40px 32px;
            width: 100%; max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            color: #e8a020;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .logo p {
            color: #6b7a8d;
            font-size: 13px;
            margin-top: 4px;
        }
        label {
            display: block;
            color: #8a9bb0;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            background: #0f1923;
            border: 1px solid #2a3a50;
            border-radius: 8px;
            color: #e0e8f0;
            font-size: 15px;
            padding: 12px 14px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #e8a020; }
        .btn {
            width: 100%;
            background: #e8a020;
            color: #0f1923;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            padding: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #f0b030; }
        .eroare {
            background: #2a1515;
            border: 1px solid #c0392b;
            color: #e74c3c;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>VELORIX</h1>
            <p>Service Management</p>
        </div>

        {% if eroare %}
        <div class="eroare">{{ eroare }}</div>
        {% endif %}

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="username" autocomplete="username" required>

            <label>Parola</label>
            <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

            <button type="submit" class="btn">Conectare</button>
        </form>
    </div>
</body>
</html>
